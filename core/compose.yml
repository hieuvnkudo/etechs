services:
  app:
    # Build the image from the Dockerfile in the current directory
    build: .

    # Host the FastAPI application on port 8000
    ports:
      - "8000:8000"

    # Include development dependencies when working locally
    environment:
      - UV_NO_DEV=0

    command: ["fastapi", "dev", "--host", "0.0.0.0", "app/main.py"]

    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
        - action: rebuild
          path: ./pyproject.toml